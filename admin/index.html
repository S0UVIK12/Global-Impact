<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Decap CMS - Admin</title>
    <link rel="stylesheet" href="https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.css" />
    <style>
      body { font-family: Inter, system-ui, -apple-system, Arial; margin:0 }
      .admin-wrapper { display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column }
      .admin-status { max-width:800px;padding:20px;text-align:center;color:#333 }
      .admin-error { color:#b00020;white-space:pre-wrap;text-align:left;margin-top:12px }
    </style>
  </head>
  <body>
    <div class="admin-wrapper">
      <div class="admin-status">
        <h2>Loading content editor...</h2>
        <p>If the admin UI stays blank, any load or configuration errors will appear below.</p>
        <div id="admin-log" class="admin-error" aria-live="polite"></div>
      </div>
    </div>

    <!-- Prevent auto-init; we'll initialize after loading the correct config -->
    <script>window.CMS_MANUAL_INIT = true;</script>
    <!-- YAML parser for converting config.yml to JSON object -->
    <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script>
      // Helper to append status/error messages to the page for debugging
      function logAdmin(msg) {
        const el = document.getElementById('admin-log');
        if (!el) return;
        el.textContent += msg + '\n';
      }

      // Load Decap CMS script dynamically so we can catch load errors
      (function loadDecap() {
        const url = 'https://unpkg.com/decap-cms@^3.11.0/dist/decap-cms.js';
        const s = document.createElement('script');
        s.src = url;
        s.async = true;
        s.onload = () => {
          logAdmin('Decap script loaded.');
          if (!window.CMS) {
            logAdmin('CMS object not found after script load.');
            return;
          }

          // Try several candidate locations for config.yml until one succeeds.
          const candidates = [
            '/admin/config.yml',
            // path relative to current pathname (useful for project pages like /<repo>/admin/)
            (location.pathname.replace(/\/$/, '') + '/config.yml'),
            // repo-rooted admin
            (location.pathname.replace(/\/admin\/?$/, '') + '/admin/config.yml')
          ];

          (async function findAndInit() {
            for (const p of candidates) {
              try {
                logAdmin('Trying config: ' + p);
                const res = await fetch(p, {cache: 'no-store'});
                if (!res.ok) { logAdmin('No config at ' + p + ' (' + res.status + ')'); continue; }
                const text = await res.text();
                // parse YAML to JS object
                let cfg = null;
                try { cfg = window.jsyaml ? window.jsyaml.load(text) : null; } catch (pe) { logAdmin('YAML parse error: ' + pe.message); }
                if (!cfg) {
                  logAdmin('Parsed config is empty or YAML parser missing.');
                  continue;
                }
                logAdmin('Loaded config from ' + p);
                try {
                  // Initialize CMS with the parsed config object
                  window.CMS.init({ config: cfg });
                  logAdmin('CMS.init(config) called successfully.');
                } catch (initErr) {
                  logAdmin('CMS.init threw: ' + initErr.message);
                }
                return;
              } catch (err) {
                logAdmin('Error fetching ' + p + ': ' + err.message);
              }
            }
            logAdmin('Could not find a usable admin/config.yml; check file paths.');
          })();
        };
        s.onerror = (e) => {
          logAdmin('Failed to load Decap script: ' + url);
        };
        document.head.appendChild(s);
      })();

        // Removed a redundant root-relative fetch to avoid noisy 404 messages
    </script>
  </body>
</html>
