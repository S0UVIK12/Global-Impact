backend:
  name: github
  repo: "S0UVIK12/Global-Impact" # replace with your repo
  branch: main

media_folder: "static/uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "gallery_json"
    label: "Gallery"
    files:
      - name: "gallery_file"
        file: "data/gallery.json"
        label: "Gallery JSON"
        fields:
          - { label: "Items", name: "items", widget: list, required: false, fields: [
              { label: "Title", name: "title", widget: string },
              { label: "Image URL", name: "image", widget: string },
              { label: "Category", name: "category", widget: string },
              { label: "Caption", name: "caption", widget: text },
              { label: "Date", name: "date", widget: datetime }
            ] }

  - name: "members_json"
    label: "Members"
    files:
      - name: "members_file"
        file: "data/members.json"
        label: "Members JSON"
        fields:
          - { label: "Items", name: "items", widget: list, required: false, fields: [
              { label: "Name", name: "name", widget: string },
              { label: "Role", name: "role", widget: string },
              { label: "Photo URL", name: "photo", widget: string },
              { label: "Bio", name: "bio", widget: text },
              { label: "Type", name: "type", widget: string, hint: "leadership or regional" }
            ] }

  - name: "notifications_json"
    label: "Notifications"
    files:
      - name: "notifications_file"
        file: "data/notifications.json"
        label: "Notifications JSON"
        fields:
          - { label: "Items", name: "items", widget: list, required: false, fields: [
              { label: "Title", name: "title", widget: string },
              { label: "Type", name: "type", widget: string, hint: "announcement, event, urgent" },
              { label: "Date", name: "date", widget: datetime },
              { label: "Body", name: "body", widget: text },
              { label: "CTA Label", name: "cta", widget: string },
              { label: "URL", name: "url", widget: string }
            ] }
